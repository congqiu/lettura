services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5437:5432"
    environment:
      POSTGRES_USER: lettura
      POSTGRES_PASSWORD: lettura
      POSTGRES_DB: lettura
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lettura"]
      interval: 2s
      timeout: 2s
      retries: 5
