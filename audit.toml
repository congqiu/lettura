# Advisory ignore list for `cargo audit`.
#
# Entries here are **transitive dependencies** we cannot directly upgrade.
# Each entry includes a note explaining why it is safe to ignore and when
# to revisit.

# rsa 0.9.x — Marvin Attack (timing sidechannel on private-key operations).
# Comes from sqlx → sqlx-mysql.  We only use the PostgreSQL driver, so the
# vulnerable code path is never exercised.  No fixed rsa version exists yet.
# Revisit when sqlx 0.9 (which may drop sqlx-mysql's rsa dep) is stable.
[[advisories.ignore]]
id = "RUSTSEC-2023-0071"
reason = "transitive via sqlx-mysql; we only use PostgreSQL"

# rustls-webpki 0.101.x — CRL parsing panic (RUSTSEC-2026-0104),
# URI name-constraint bypass (RUSTSEC-2026-0098), and wildcard
# name-constraint bypass (RUSTSEC-2026-0099).
# All three come from rust-s3 0.35 → rustls 0.21 → webpki 0.101.
# Fix requires upgrading rust-s3 to >= 0.37 (uses rustls 0.23+).
[[advisories.ignore]]
id = "RUSTSEC-2026-0104"
reason = "transitive via rust-s3 0.35 → rustls 0.21; needs rust-s3 >= 0.37"

[[advisories.ignore]]
id = "RUSTSEC-2026-0098"
reason = "transitive via rust-s3 0.35 → rustls 0.21; needs rust-s3 >= 0.37"

[[advisories.ignore]]
id = "RUSTSEC-2026-0099"
reason = "transitive via rust-s3 0.35 → rustls 0.21; needs rust-s3 >= 0.37"
