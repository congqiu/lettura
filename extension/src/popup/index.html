<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lettura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Loading state -->
    <div id="loading-section" class="section">
      <div class="spinner"></div>
    </div>

    <!-- Login form -->
    <div id="login-section" class="section hidden">
      <h1 class="title">Lettura</h1>
      <p class="subtitle">稍后阅读</p>

      <div class="tabs">
        <button id="tab-password" class="tab active">密码登录</button>
        <button id="tab-token" class="tab">令牌登录</button>
      </div>

      <!-- Password login form -->
      <div id="form-password" class="tab-content">
        <div class="form-group">
          <label for="server-url">服务器地址</label>
          <input type="url" id="server-url" placeholder="https://your-lettura-instance.com" />
        </div>

        <div class="form-group">
          <label for="email">邮箱</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <div id="login-error" class="message error hidden"></div>

        <button id="login-btn" class="btn btn-primary">登录</button>
      </div>

      <!-- Token login form -->
      <div id="form-token" class="tab-content hidden">
        <div class="form-group">
          <label for="token-server-url">服务器地址</label>
          <input type="url" id="token-server-url" placeholder="https://your-lettura-instance.com" />
        </div>

        <div class="form-group">
          <label for="token-input">令牌</label>
          <input type="password" id="token-input" placeholder="lta_..." />
        </div>

        <div id="token-error" class="message error hidden"></div>

        <button id="token-btn" class="btn btn-primary">连接</button>
      </div>
    </div>

    <!-- Main section (after login) -->
    <div id="main-section" class="section hidden">
      <div class="header">
        <h1 class="title">Lettura</h1>
        <div class="header-badges">
          <span id="server-info" class="server-badge"></span>
          <span id="token-badge" class="token-badge hidden"></span>
        </div>
      </div>

      <button id="save-btn" class="btn btn-primary btn-block">保存此页面</button>
      <div id="save-status" class="message hidden"></div>

      <button id="logout-btn" class="btn btn-secondary btn-block">退出登录</button>
    </div>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
