services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lettura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lettura}
      POSTGRES_DB: ${POSTGRES_DB:-lettura}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lettura}"]
      interval: 5s
      timeout: 5s
      retries: 5

  lettura:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - RENDERING=${RENDERING:-1}
    ports:
      - "${APP_PORT:-3330}:3330"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lettura}:${POSTGRES_PASSWORD:-lettura}@postgres:5432/${POSTGRES_DB:-lettura}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LETTURA_SITE_CONFIGS_PATH: /data/site-configs
      LETTURA_RENDERING_ENABLED: ${LETTURA_RENDERING_ENABLED:-auto}
      LETTURA_CHROMIUM_PATH: ${LETTURA_CHROMIUM_PATH:-}
      LETTURA_RENDER_CONCURRENCY: ${LETTURA_RENDER_CONCURRENCY:-2}
      LETTURA_RENDER_TIMEOUT_MS: ${LETTURA_RENDER_TIMEOUT_MS:-15000}
    volumes:
      - ./site-configs-local:/data/site-configs:ro
      - appdata:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  appdata: