name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lettura
        ports:
          - 5436:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5436/lettura
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build frontend assets
        run: cd web && pnpm install --frozen-lockfile && pnpm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--no-default-features` drops chromiumoxide (Chromium not installed
       # on the CI runner); `--features test-utils` enables the test-only
       # skip_ssrf hook needed by httpmock-based integration tests.
      - name: Run tests
        run: cargo test --no-default-features --features test-utils
      - name: Check formatting
        run: cargo fmt --check
      # Clippy reports historical type-complexity / overindented-doc warnings;
       # we keep clippy enabled to catch new deny-level lints but don't
       # promote warnings to errors until the historical set is cleaned up.
      - name: Clippy lints
        run: cargo clippy --no-default-features --features test-utils
      - name: Security audit
        run: cargo install cargo-audit --locked && cargo audit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: npx tsc -b
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: pnpm run build
      - name: Security audit
        run: pnpm audit --audit-level=moderate || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t lettura:ci .
